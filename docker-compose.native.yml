services:
  # nginx: routes external port 28314 → native backend on host:8314
  nginx:
    image: nginx:alpine
    ports:
      - "28314:80"
    volumes:
      - ./deploy/nginx/native.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    networks: [piloci_net]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --save 60 1
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - ~/app/piloci/data/redis:/data
    networks: [piloci_net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  piloci_net:
    driver: bridge
