repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: black
        name: black
        entry: uv run black
        language: system
        types: [python]
      - id: isort
        name: isort
        entry: uv run isort
        language: system
        types: [python]
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: pytest
        name: pytest
        entry: uv run pytest tests/ -v --no-cov
        language: system
        pass_filenames: false

      - id: next-lint
        name: next lint
        entry: bash -c "cd web && pnpm run lint"
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false
        
      - id: vitest
        name: vitest
        entry: bash -c "cd web && pnpm run test"
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false
