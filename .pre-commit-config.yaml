# Two-stage hook setup:
#   - pre-commit  (every `git commit`)  → formatters + lint, ~1-2s
#   - pre-push    (every `git push`)    → pytest + vitest, ~30-60s
#
# Run once after editing this file so both hook types are installed:
#   pre-commit install
#
# The ``default_install_hook_types`` line below makes ``pre-commit install``
# wire up both hook types in one shot.
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      # ── pre-commit (fast, every commit) ─────────────────────────────
      #
      # ``uv run --frozen`` skips the lockfile re-resolution step that
      # would otherwise touch uv.lock during the hook. That mutation
      # collides with pre-commit's stash/restore of unstaged changes and
      # silently rolls the commit back, so keep --frozen on every entry.
      - id: black
        name: black
        entry: uv run --frozen black
        language: system
        types: [python]
      - id: isort
        name: isort
        entry: uv run --frozen isort
        language: system
        types: [python]
      - id: ruff
        name: ruff
        entry: uv run --frozen ruff check --fix
        language: system
        types: [python]
      - id: next-lint
        name: next lint
        entry: bash -c "cd web && pnpm run lint"
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false

      # ── pre-push (heavier, runs before sending to remote) ───────────
      - id: pytest
        name: pytest
        entry: uv run --frozen pytest tests/ -q --no-cov --tb=short
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: uv-build
        name: uv build
        entry: uv build
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: vitest
        name: vitest
        entry: bash -c "cd web && pnpm run test"
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pnpm-build
        name: pnpm build
        entry: bash -c "cd web && pnpm build"
        language: system
        pass_filenames: false
        stages: [pre-push]
