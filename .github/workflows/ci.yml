name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v[0-9]*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Branch pushes cancel previous runs; tag pushes never cancel.
concurrency:
  group: ${{ startsWith(github.ref, 'refs/tags/') && format('ci-tag-{0}', github.sha) || format('ci-branch-{0}', github.ref) }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ──────────────────────────────────────────
  # Lint & type check
  # ──────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: black
        run: |
          source .venv/bin/activate
          black --check --diff src/ tests/

      - name: isort
        run: |
          source .venv/bin/activate
          isort --check-only --diff src/ tests/

      - name: ruff
        run: |
          source .venv/bin/activate
          ruff check src/ tests/

  # ──────────────────────────────────────────
  # Test
  # ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: pytest
        run: |
          source .venv/bin/activate
          pytest tests/ -v --cov=src/piloci --cov-report=xml --cov-report=term-missing

      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────
  # Web build check (Next.js type-check only — no full build on every commit)
  # ──────────────────────────────────────────
  web-check:
    name: Web Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --no-frozen-lockfile
        working-directory: web

      - name: tsc
        run: pnpm exec tsc --noEmit
        working-directory: web
