name: Publish

# ONLY runs on version tags — never on bare commits.
# Create a release: git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ['v[0-9]*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.2.0)'
        required: true

# Tag runs are never cancelled by concurrent pushes.
concurrency:
  group: publish-${{ github.sha }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────
  # Guard: pyproject.toml version must match tag
  # ──────────────────────────────────────────
  version-check:
    name: Version Guard
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Verify pyproject.toml matches tag
        run: |
          PKG=$(python3 -c "
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])
          ")
          TAG_VER="${{ steps.ver.outputs.version }}"
          echo "pyproject.toml: $PKG  |  tag: $TAG_VER"
          if [ "$PKG" != "$TAG_VER" ]; then
            echo "::error::Version mismatch — update pyproject.toml to $TAG_VER before tagging"
            exit 1
          fi

  # ──────────────────────────────────────────
  # Full test suite (gate for publish)
  # ──────────────────────────────────────────
  test:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install & test
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          pytest tests/ -v

  # ──────────────────────────────────────────
  # Build Next.js static export
  # ──────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --no-frozen-lockfile
        working-directory: web

      - name: Build
        run: pnpm build
        working-directory: web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: web/out/
          retention-days: 1

  # ──────────────────────────────────────────
  # Build & push Docker image (arm64 + amd64)
  # ──────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, build-web]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-out
          path: src/piloci/static/

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64,linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # GitHub Release
  # ──────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release exists
        id: check
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          name: Release ${{ steps.check.outputs.tag }}
          body: |
            ## Install / Update

            > `uvx` caches the last version — it does **not** auto-update. Upgrade via `uv`:

            ```bash
            # 처음 실행 (자동 설치)
            uvx --from oc-piloci piloci --help

            # 업데이트 후 실행
            uvx --refresh --from oc-piloci piloci --help
            ```

            After updating, **restart your MCP client** to load the new version.

            ## Docker

            ```bash
            # Raspberry Pi 5 (arm64)
            docker pull ghcr.io/${{ github.repository }}:${{ needs.version-check.outputs.version }}

            # docker-compose.yml 업데이트
            image: ghcr.io/${{ github.repository }}:${{ needs.version-check.outputs.version }}
            docker compose pull && docker compose up -d
            ```

            ## Changelog
            https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────
  # Publish to PyPI (tag push only)
  # ──────────────────────────────────────────
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, version-check]
    permissions:
      contents: read
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
