name: CI & Publish

on:
  push:
    branches: [main, develop]
    tags: ['v[0-9]*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.0.1)'
        required: true

# Branch pushes cancel previous runs; tag/PR runs never cancel.
concurrency:
  group: ${{ startsWith(github.ref, 'refs/tags/') && format('tag-{0}', github.sha) || format('branch-{0}', github.ref) }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.event_name != 'pull_request' }}

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE: jshsakura/piloci

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────
  # Lint & type check (always)
  # ──────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: black
        run: |
          source .venv/bin/activate
          black --check --diff src/ tests/

      - name: isort
        run: |
          source .venv/bin/activate
          isort --check-only --diff src/ tests/

      - name: ruff
        run: |
          source .venv/bin/activate
          ruff check src/ tests/

  # ──────────────────────────────────────────
  # Test (always, after lint)
  # ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: pytest
        run: |
          source .venv/bin/activate
          pytest tests/ -v --cov=src/piloci --cov-report=xml --cov-report=term-missing

      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────
  # Web type check (always, parallel with test)
  # ──────────────────────────────────────────
  web-check:
    name: Web Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --no-frozen-lockfile
        working-directory: web

      - name: tsc
        run: pnpm exec tsc --noEmit
        working-directory: web

  # ═══════════════════════════════════════════
  # PUBLISH GATE — tag push only, after CI
  # ═══════════════════════════════════════════

  version-check:
    name: Version Guard
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    needs: [test, web-check]
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Verify pyproject.toml matches tag
        run: |
          PKG=$(python3 -c "
          import tomllib, pathlib
          print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])
          ")
          TAG_VER="${{ steps.ver.outputs.version }}"
          echo "pyproject.toml: $PKG  |  tag: $TAG_VER"
          if [ "$PKG" != "$TAG_VER" ]; then
            echo "::error::Version mismatch — update pyproject.toml to $TAG_VER before tagging"
            exit 1
          fi

  build-web:
    name: Build Web
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --no-frozen-lockfile
        working-directory: web

      - name: Build
        run: pnpm build
        working-directory: web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: web/out/
          retention-days: 1

  docker:
    name: Docker Build & Push
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    needs: [version-check, build-web]
    steps:
      - uses: actions/checkout@v4

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-out
          path: src/piloci/static/

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64,linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release exists
        id: check
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          name: Release ${{ steps.check.outputs.tag }}
          body: |
            ## Install / Update

            > `uvx` caches the last version — it does **not** auto-update. Upgrade via `uv`:

            ```bash
            # 처음 실행 (자동 설치)
            uvx --from oc-piloci piloci --help

            # 업데이트 후 실행
            uvx --refresh --from oc-piloci piloci --help
            ```

            After updating, **restart your MCP client** to load the new version.

            ## Docker

            ```bash
            # Docker Hub (recommended)
            docker pull jshsakura/piloci:${{ needs.version-check.outputs.version }}

            # GHCR
            docker pull ghcr.io/${{ github.repository }}:${{ needs.version-check.outputs.version }}

            # docker-compose.yml 업데이트
            image: jshsakura/piloci:${{ needs.version-check.outputs.version }}
            docker compose pull && docker compose up -d
            ```

            ## Changelog
            https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ──────────────────────────────────────────
  # Telegram deploy notification
  # ──────────────────────────────────────────
  notify:
    name: Telegram Notify
    if: always() && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != '')
    runs-on: ubuntu-latest
    needs: [docker, release, pypi]
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *piLoci v${{ github.ref_name }} 배포 ${{ needs.docker.result == 'success' && '완료 ✅' || '실패 ❌' }}*

            이미지: `jshsakura/piloci:${{ github.ref_name }}`
            GHCR: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
            Docker `${{ needs.docker.result }}` · Release `${{ needs.release.result }}` · PyPI `${{ needs.pypi.result }}`
            [워크플로우 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
