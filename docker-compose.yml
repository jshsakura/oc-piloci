# ──────────────────────────────────────────────────────────────
# piLoci — Production Docker Compose
#
# Quick start:
#   1. ./deploy/setup.sh          # generate .env with runtime secrets
#   2. docker compose pull
#   3. docker compose up -d
#
# Architecture:
#   piloci:8314 ← redis:6379
#   └── SQLite + LanceDB on /data volume
#
# Reverse proxy (Cloudflare Tunnel, nginx, Caddy, etc.) is
# managed outside this compose file.
# ──────────────────────────────────────────────────────────────
services:
  piloci:
    image: ${PILOCI_IMAGE:-jshsakura/piloci:latest}
    restart: unless-stopped
    read_only: true
    user: "1000:1000"
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:////data/piloci.db
      - LANCEDB_PATH=/data/lancedb
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    env_file:
      - .env
    volumes:
      - piloci_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks: [piloci_internal]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8314/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [piloci_internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  piloci_data:
  redis_data:

networks:
  piloci_internal:
    driver: bridge
