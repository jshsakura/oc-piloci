services:
  # ── Dev proxy (single external port) ─────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "28314:80"
    volumes:
      - ./deploy/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"  # reach native pnpm dev on host
    depends_on:
      - piloci
    networks: [piloci_net]
    restart: "no"

  # ── Backend ───────────────────────────────────────────────────
  piloci:
    build:
      context: .
      target: dev
    ports:
      - "8314:8314"
    volumes:
      - ./src:/app/src:ro
      - ~/app/piloci/data/piloci:/data
    environment:
      - PORT=8314
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:////data/piloci.db
      - LANCEDB_PATH=/data/lancedb
      - LOG_LEVEL=DEBUG
      - LOG_FORMAT=text
      - RELOAD=true
      - DEBUG=true
    env_file:
      - .env
    depends_on:
      redis: { condition: service_healthy }
    networks: [piloci_net]
    restart: "no"

  # ── Deps ──────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --save 60 1
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - ~/app/piloci/data/redis:/data
    networks: [piloci_net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  piloci_net:
    driver: bridge
